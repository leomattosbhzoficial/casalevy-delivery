<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Casa Levi Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0E0E0E;--mid:#555;--light:#888;--border:#E0E0E0;--surface:#F6F6F6;--white:#fff;--green:#25D366}
body{background:var(--surface);font-family:"DM Sans",sans-serif;display:flex;justify-content:center;padding-bottom:80px}
.app{width:100%;max-width:430px;background:var(--white);min-height:100vh}
.screen{display:none}.screen.active{display:block}
.logo-banner{background:var(--black);padding:24px 18px 20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.logo-banner img{height:80px;width:auto}
.logo-banner span{font-size:10px;color:#444;letter-spacing:1.5px;text-transform:uppercase}
.search-bar{padding:12px 16px;border-bottom:1px solid var(--border)}
.sw{position:relative}
.sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:#bbb;fill:none;stroke-width:2;stroke-linecap:round}
.search-bar input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 36px;font-size:14px;color:var(--black);outline:none;font-family:"DM Sans",sans-serif}
.cf{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.cf::-webkit-scrollbar{display:none}
.cb{white-space:nowrap;font-size:10px;font-weight:500;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--mid);cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
.cb.on{background:var(--black);color:#fff;border-color:var(--black)}
.pl{padding:12px 16px;display:flex;flex-direction:column;gap:8px;padding-bottom:100px}
.st{font-size:10px;color:#bbb;padding:8px 0 3px;text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
.pc{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;transition:border-color .15s}
.pc:hover{border-color:#aaa}
.pc img{width:88px;height:88px;object-fit:cover;flex-shrink:0;display:block}
.pb{padding:10px 12px;flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.pt{margin-bottom:4px}
.lb{display:inline-block;font-size:9px;padding:2px 7px;border-radius:3px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;border:1px solid var(--border);color:#bbb;background:var(--surface)}
.pn{font-family:"Playfair Display",serif;font-size:13px;font-weight:500;color:var(--black);line-height:1.3;margin-bottom:1px}
.ps{font-size:10px;color:var(--light);font-weight:300;line-height:1.3}
.pbot{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.pr{font-size:13px;font-weight:500;color:var(--black)}
.qc{display:flex;align-items:center;gap:0}
.qb{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--black);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:"DM Sans",sans-serif;line-height:1}
.qb:hover{background:var(--black);color:#fff;border-color:var(--black)}
.qn{font-size:13px;font-weight:500;color:var(--black);min-width:22px;text-align:center}
.combo{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .15s}
.combo:hover{border-color:#aaa}
.combo.hi{border-color:#C9A84C;background:#FFFDF5}
.ctag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:3px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px;border:1px solid #C9A84C;color:#9A7830;background:#FFF8E7}
.cn{font-family:"Playfair Display",serif;font-size:15px;font-weight:500;color:var(--black);margin-bottom:4px}
.cd{font-size:12px;color:var(--mid);line-height:1.5;margin-bottom:8px}
.cpr{display:flex;align-items:center;gap:8px}
.co{font-size:11px;color:#bbb;text-decoration:line-through}
.cnw{font-size:15px;font-weight:500;color:var(--black);font-family:"Playfair Display",serif}
.cart{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--black);padding:12px 16px;display:none;align-items:center;justify-content:space-between;gap:12px;z-index:100}
.cart.on{display:flex}
.ci span:first-child{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.5px;display:block}
.ci span:last-child{font-family:"Playfair Display",serif;font-size:18px;color:#fff}
.csend{background:var(--green);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:500;padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:7px;font-family:"DM Sans",sans-serif;white-space:nowrap}
.csend svg{width:18px;height:18px;fill:#fff}
.dh{width:100%;height:250px;object-fit:cover;display:block}
.db{padding:20px 16px;padding-bottom:100px}
.back{display:flex;align-items:center;gap:8px;margin-bottom:18px;cursor:pointer}
.back svg{width:18px;height:18px;stroke:var(--mid);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.back span{font-size:11px;color:var(--mid);text-transform:uppercase;letter-spacing:.3px}
.dn{font-family:"Playfair Display",serif;font-size:24px;font-weight:400;color:var(--black);margin-bottom:4px;line-height:1.2}
.ds{font-size:12px;color:var(--light);margin-bottom:14px;font-weight:300}
.dd{font-size:13px;color:var(--mid);line-height:1.8;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.nt{font-size:10px;color:var(--light);cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.5px}
.nt svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round}
.nb{background:var(--surface);border-radius:8px;padding:10px 12px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ni{font-size:11px;color:var(--light);font-weight:300}
.ni span{color:var(--black);font-weight:500;display:block;font-size:13px}
.dqr{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:14px}
.dql{font-size:11px;color:var(--mid);text-transform:uppercase;letter-spacing:.5px}
.dqc{display:flex;align-items:center;gap:4px}
.dqb{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--black);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.dqb:hover{background:var(--black);color:#fff;border-color:var(--black)}
.dqn{font-size:18px;font-weight:500;color:var(--black);min-width:32px;text-align:center}
.addbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--black);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;transition:opacity .2s}
.addbtn:hover{opacity:.85}
.empty{text-align:center;padding:50px 16px;color:var(--light);font-size:13px}
@media(max-width:430px){body{padding-bottom:80px}}
</style>
</head>

function fp(v){return"R$ "+v.toFixed(2).replace(".",",");}
function cartCount(){return Object.values(cart).reduce(function(s,v){return s+v;},0);}
function cartTotal(){
  return Object.keys(cart).reduce(function(s,id){
    var p=produtos.filter(function(x){return x.id===parseInt(id);})[0];
    return s+(p?p.preco*cart[id]:0);
  },0);
}
function updateCart(){
  var n=cartCount();
  var el=document.getElementById("cart");
  if(n===0){el.classList.remove("on");return;}
  el.classList.add("on");
  document.getElementById("ccount").textContent=n+(n===1?" item":" itens")+" no carrinho";
  document.getElementById("ctotal").textContent=fp(cartTotal());
}
function sendCart(){
  if(cartCount()===0)return;
  var lines=["Olá! Gostaria de fazer o seguinte pedido:",""];

    var p=produtos.filter(function(x){return x.id===parseInt(id);})[0];
    if(p&&cart[id]>0) lines.push("- "+cart[id]+"x "+p.nome+" ("+fp(p.preco*cart[id])+")");
  });
  lines.push("");
  lines.push("Total: "+fp(cartTotal()));

}

  document.getElementById("cf").innerHTML=cats.map(function(c){
    return "<button class='cb"+(c===activeCat?" on":"")+"' onclick=\"setCat('"+c+"')\">"+c+"</button>";
  }).join("");
}
function setCat(c){activeCat=c;renderCats();renderList();}
function qHtml(id){
  var q=cart[id]||0;
  if(q===0) return "<button class='qb' onclick='event.stopPropagation();addOne("+id+")'>+</button>";
  return "<div class='qc' onclick='event.stopPropagation()'><button class='qb' onclick='rmOne("+id+")'>&#8722;</button><span class='qn'>"+q+"</span><button class='qb' onclick='addOne("+id+")'>+</button></div>";
}
function addOne(id){cart[id]=(cart[id]||0)+1;renderList();updateCart();}
function rmOne(id){if(cart[id]>0)cart[id]--;if(cart[id]===0)delete cart[id];renderList();updateCart();}
function renderList(){
  var q=document.getElementById("si").value.toLowerCase();
  var el=document.getElementById("pl");
  var html="";
  if(activeCat==="Combos"){
    html+="<div class='st'>Combos Especiais Casa Levi</div>";
    combos.forEach(function(c){html+=comboHtml(c);});
    el.innerHTML=html;return;
  }
  var fil=produtos.filter(function(p){
    return(activeCat==="Todos"||p.linha===activeCat)&&
      (p.nome.toLowerCase().indexOf(q)>=0||p.sub.toLowerCase().indexOf(q)>=0);
  });
  if(!fil.length){el.innerHTML="<div class='empty'>Nenhum produto encontrado</div>";return;}
  var by={};
  fil.forEach(function(p){if(!by[p.linha])by[p.linha]=[];by[p.linha].push(p);});
  ["Clássica","Gourmet"].forEach(function(linha){
    if(!by[linha])return;
    html+="<div class='st'>Linha "+linha+" &mdash; "+(linha==="Clássica"?"R$ 27,90":"R$ 31,90")+"</div>";
    by[linha].forEach(function(p){
      html+="<div class='pc' onclick='openDetail("+p.id+")'>";
      html+="<img src='"+IMGS[p.imgKey]+"' alt='"+p.nome+"'>";
      html+="<div class='pb'>";
      html+="<div class='pt'><span class='lb'>"+linha+"</span><div class='pn'>"+p.nome+"</div><div class='ps'>"+p.sub+"</div></div>";
      html+="<div class='pbot'><span class='pr'>"+fp(p.preco)+"</span>"+qHtml(p.id)+"</div>";
      html+="</div></div>";
    });
  });
  if(activeCat==="Todos"){
    html+="<div class='st'>Combos Especiais</div>";
    combos.forEach(function(c){html+=comboHtml(c);});
  }
  el.innerHTML=html;
}
function comboHtml(c){
  return "<div class='"+(c.hi?"combo hi":"combo")+"' onclick='pedirCombo("+c.id+")'>"
    +"<span class='ctag'>Combo"+(c.hi?" ⭐":"")+"</span>"
    +"<div class='cn'>"+c.nome+"</div>"
    +"<div class='cd'>"+c.desc+"</div>"
    +"<div class='cpr'><span class='co'>"+c.old+"</span><span class='cnw'>"+c.nw+"</span></div>"
    +"</div>";
}
function pedirCombo(id){
  var c=combos.filter(function(x){return x.id===id;})[0];
  if(!c)return;
  window.open("https://wa.me/"+WA+"?text="+encodeURIComponent("Olá! Gostaria de pedir o "+c.msg),"_blank");
}
function openDetail(id){
  curProd=produtos.filter(function(p){return p.id===id;})[0];
  dQty=cart[id]||1;
  nutrOn=false;
  document.getElementById("dh").src=IMGS[curProd.imgKey];
  document.getElementById("dbadge").innerHTML="<span class='lb'>"+curProd.linha+"</span>";
  document.getElementById("dname").textContent=curProd.nome;
  document.getElementById("dsub").textContent=curProd.sub;
  document.getElementById("ddesc").textContent=curProd.desc;
  document.getElementById("nb").style.display="none";
  document.getElementById("ntlabel").textContent="Informações nutricionais (500ml)";
  document.getElementById("dqn").textContent=dQty;
  var n=curProd.nutr;
  document.getElementById("nb").innerHTML=
    "<div class='ni'>Calorias<span>"+n.kcal+" kcal</span></div>"+
    "<div class='ni'>Proteínas<span>"+n.prot+"g</span></div>"+
    "<div class='ni'>Carboidratos<span>"+n.carb+"g</span></div>"+
    "<div class='ni'>Gorduras<span>"+n.gord+"g</span></div>"+
    "<div class='ni'>Fibras<span>"+n.fibras+"g</span></div>"+
    "<div class='ni'>Sódio<span>"+n.sodio+"mg</span></div>";
  document.getElementById("sh").classList.remove("active");
  document.getElementById("sd").classList.add("active");
  window.scrollTo(0,0);
}
function toggleNutr(){
  nutrOn=!nutrOn;
  document.getElementById("nb").style.display=nutrOn?"grid":"none";
  document.getElementById("ntlabel").textContent=nutrOn?"Ocultar informações nutricionais":"Informações nutricionais (500ml)";
}
function goHome(){
  document.getElementById("sd").classList.remove("active");
  document.getElementById("sh").classList.add("active");
  window.scrollTo(0,0);
}
function addToCart(){
  if(!curProd)return;
  cart[curProd.id]=dQty;
  updateCart();
  goHome();
}
document.getElementById("dqminus").onclick=function(){dQty=Math.max(1,dQty-1);document.getElementById("dqn").textContent=dQty;};
document.getElementById("dqplus").onclick=function(){dQty++;document.getElementById("dqn").textContent=dQty;};
document.getElementById("addbtn").onclick=addToCart;
document.getElementById("csend").onclick=sendCart;
document.getElementById("si").oninput=renderList;
renderCats();renderList();
</script>
</body>
</html>
